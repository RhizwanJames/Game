<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkQuotes Pro</title>
    <style>
        :root {
            --bg: #121212;
            --text: #ffffff;
            --card: #ffffff;
            --quote: #111111;
        }
        .light {
            --bg: #e0e0e0;
            --text: #121212;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: 0.4s;
            overflow: hidden;
        }
        .nav {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        select, .t-btn {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        #app {
            position: relative;
            width: 320px;
            height: 480px;
        }
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease;
        }
        .quote-text { color: var(--quote); font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .quote-author { color: #ff2d55; font-style: italic; text-transform: uppercase; }
        .controls { margin-top: 30px; display: flex; gap: 20px; }
        .btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            background: white; font-size: 24px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .no { color: #ff3b30; }
        .yes { color: #34c759; }
        
        /* History Sidebar */
        #history {
            position: absolute;
            right: -250px;
            width: 250px;
            height: 100%;
            background: rgba(0,0,0,0.9);
            transition: 0.3s;
            padding: 20px;
            overflow-y: auto;
            color: white;
            font-size: 14px;
        }
        #history.open { right: 0; }
    </style>
</head>
<body id="body">

    <div class="nav">
        <select id="cat" onchange="getQuote()">
            <option value="famous-quotes">Wisdom</option>
            <option value="success">Success</option>
            <option value="inspirational">Inspiration</option>
        </select>
        <button class="t-btn" onclick="document.body.classList.toggle('light')">🌓 Theme</button>
        <button class="t-btn" onclick="document.getElementById('history').classList.toggle('open')">📜 History</button>
    </div>

    <div id="app">
        <div id="main-card" class="card">
            <div id="text" class="quote-text">Click a button to start</div>
            <div id="author" class="quote-author"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn no" onclick="swipe('left')">✕</button>
        <button class="btn yes" onclick="swipe('right')">♥</button>
    </div>

    <div id="history"><h3>Liked Quotes</h3><div id="hist-list"></div></div>

    <script>
        let currentQuote = "";
        async function getQuote() {
            const cat = document.getElementById('cat').value;
            try {
                const res = await fetch(`https://api.quotable.io/random?tags=${cat}`);
                const data = await res.json();
                currentQuote = data.content;
                document.getElementById('text').innerText = `"${data.content}"`;
                document.getElementById('author').innerText = `— ${data.author}`;
            } catch (e) {
                document.getElementById('text').innerText = "Keep going, you're doing great!";
            }
        }

        function swipe(dir) {
            const card = document.getElementById('main-card');
            if(dir === 'right') {
                const item = document.createElement('p');
                item.innerText = currentQuote;
                document.getElementById('hist-list').prepend(item);
            }
            
            card.style.transform = `translateX(${dir==='right'?600:-600}px) rotate(${dir==='right'?25:-25}deg)`;
            card.style.opacity = "0";
            
            setTimeout(async () => {
                await getQuote();
                card.style.transition = "none";
                card.style.transform = "translate(0) rotate(0)";
                card.style.opacity = "1";
                setTimeout(() => card.style.transition = "transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s", 50);
            }, 400);
        }
        window.onload = getQuote;
    </script>
</body>
</html>
