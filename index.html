<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkQuotes</title>
    <style>
        body {
            margin: 0;
            background: #121212; /* Solid black to be safe */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        #app {
            position: relative;
            width: 300px;
            height: 450px;
            background: #1a1a1a;
            border-radius: 20px;
            border: 2px solid #333;
        }

        .card {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .quote-text {
            color: #111;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .quote-author {
            color: #ff4b2b;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
        }

        .btn-no { background: #ff4b2b; color: white; }
        .btn-yes { background: #00d2ff; color: white; }
    </style>
</head>
<body>

    <h2 style="color: #ff4b2b;">SparkQuotes</h2>

    <div id="app">
        <div id="main-card" class="card">
            <div class="quote-text" id="text">"Loading your motivation..."</div>
            <div class="quote-author" id="author">PLEASE WAIT</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-no" onclick="swipe('left')">NEXT</button>
        <button class="btn-yes" onclick="swipe('right')">SAVE</button>
    </div>

    <script>
        const quotes = [
            { t: "The best way to predict the future is to create it.", a: "Peter Drucker" },
            { t: "Success is not final, failure is not fatal.", a: "Winston Churchill" },
            { t: "Hard work beats talent when talent doesn't work hard.", a: "Tim Notke" },
            { t: "Dream big and dare to fail.", a: "Norman Vaughan" }
        ];

        let i = 0;

        function updateCard() {
            const card = document.getElementById('main-card');
            const q = quotes[i % quotes.length];
            
            // Reset position
            card.style.transform = "translateX(0) rotate(0)";
            card.style.opacity = "1";
            
            // Update text
            document.getElementById('text').innerText = `"${q.t}"`;
            document.getElementById('author').innerText = `— ${q.a}`;
        }

        function swipe(dir) {
            const card = document.getElementById('main-card');
            const x = dir === 'right' ? 400 : -400;
            
            card.style.transform = `translateX(${x}px) rotate(${dir === 'right' ? 20 : -20}deg)`;
            card.style.opacity = "0";

            setTimeout(() => {
                i++;
                updateCard();
            }, 300);
        }

        // Run immediately
        updateCard();
    </script>
</body>
</html>
