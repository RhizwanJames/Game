<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hustle - Infinite Inspiration</title>
    <style>
        body {
            margin: 0;
            background: #f8f9fd;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Header UI */
        .app-header {
            position: absolute;
            top: 20px;
            width: 320px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-box {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #a76bff 0%, #ff85ff 100%);
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold;
        }

        .discover-btn {
            background: white; border: 1px solid #eee;
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
        }

        /* Card System */
        #card-container {
            position: relative;
            width: 320px;
            height: 480px;
        }

        .card {
            position: absolute;
            width: 100%; height: 100%;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            box-sizing: border-box;
            display: flex; flex-direction: column;
            transition: transform 0.5s ease, opacity 0.3s ease;
        }

        .quote-text { font-size: 26px; font-weight: bold; line-height: 1.3; margin-top: 60px; }
        .author-name { margin-top: auto; font-weight: 600; color: #555; }

        /* Controls */
        .controls { margin-top: 30px; display: flex; gap: 20px; }
        .btn {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            cursor: pointer; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .no { background: white; color: #ff4b2b; }
        .yes { background: linear-gradient(135deg, #a76bff 0%, #ff85ff 100%); color: white; }
    </style>
</head>
<body>

    <div class="app-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="logo-box">H</div>
            <span style="color:#a76bff; font-weight:bold;">Hustle</span>
        </div>
        <select class="discover-btn" id="cat-select">
            <option value="famous-quotes">Discover</option>
            <option value="motivation">Motivation</option>
            <option value="success">Success</option>
        </select>
    </div>

    <div id="card-container">
        <div id="active-card" class="card">
            <div class="quote-text" id="q-text">Loading...</div>
            <div class="author-name" id="q-author"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn no" onclick="handleSwipe('left')">✕</button>
        <button class="btn yes" onclick="handleSwipe('right')">♥</button>
    </div>

    <script>
        // Force a unique request every time using a timestamp
        async function getNewQuote() {
            const cat = document.getElementById('cat-select').value;
            try {
                const response = await fetch(`https://api.quotable.io/random?tags=${cat}&t=${Date.now()}`);
                const data = await response.json();
                document.getElementById('q-text').innerText = `"${data.content}"`;
                document.getElementById('q-author').innerText = `— ${data.author}`;
            } catch (err) {
                document.getElementById('q-text').innerText = "Believe you can and you're halfway there.";
                document.getElementById('q-author').innerText = "— T. Roosevelt";
            }
        }

        function handleSwipe(direction) {
            const card = document.getElementById('active-card');
            const xMove = direction === 'right' ? 500 : -500;
            
            // 1. Swipe card out
            card.style.transform = `translateX(${xMove}px) rotate(${direction==='right'?20:-20}deg)`;
            card.style.opacity = '0';

            // 2. After it's gone, reset and load new quote
            setTimeout(async () => {
                await getNewQuote();
                card.style.transition = 'none'; // Instant reset
                card.style.transform = 'translateX(0) rotate(0)';
                card.style.opacity = '1';
                
                // 3. Re-enable transitions
                setTimeout(() => {
                    card.style.transition = 'transform 0.5s ease, opacity 0.3s ease';
                }, 50);
            }, 300);
        }

        window.onload = getNewQuote;
    </script>
</body>
</html>
