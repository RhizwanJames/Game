<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkQuotes | Pro Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #ffffff;
            --quote-color: #111111;
        }

        .light-theme {
            --bg-color: #f0f0f0;
            --text-color: #121212;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            transition: background-color 0.5s ease;
            overflow: hidden;
        }

        /* Top Bar for Controls */
        .top-bar {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        select, .theme-toggle {
            background: rgba(128, 128, 128, 0.2);
            color: var(--text-color);
            border: 1px solid rgba(128, 128, 128, 0.4);
            padding: 8px 15px;
            border-radius: 20px;
            font-family: serif;
            cursor: pointer;
            outline: none;
        }

        #app {
            position: relative;
            width: 320px;
            height: 480px;
            margin-top: 20px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease;
        }

        .quote-text {
            color: var(--quote-color);
            font-size: 22px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .quote-author {
            color: #ff2d55;
            font-size: 15px;
            font-style: italic;
            text-transform: uppercase;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }

        .btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .no { color: #ff3b30; border: 2px solid #ff3b30; }
        .yes { color: #34c759; border: 2px solid #34c759; }
        .btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="top-bar">
        <select id="categorySelect" onchange="fetchNewQuote()">
            <option value="famous-quotes">All Wisdom</option>
            <option value="success">Success</option>
            <option value="inspirational">Inspiration</option>
            <option value="wisdom">Deep Thoughts</option>
        </select>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>
    </div>

    <div id="app">
        <div id="main-card" class="card">
            <div class="quote-text" id="text">"Loading..."</div>
            <div class="quote-author" id="author"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn no" onclick="swipe('left')">✕</button>
        <button class="btn yes" onclick="swipe('right')">♥</button>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        async function fetchNewQuote() {
            const textEl = document.getElementById('text');
            const authorEl = document.getElementById('author');
            const category = document.getElementById('categorySelect').value;

            try {
                const response = await fetch(`https://api.quotable.io/random?tags=${category}`);
                const data = await response.json();
                textEl.innerText = `"${data.content}"`;
                authorEl.innerText = `— ${data.author}`;
            } catch (e) {
                textEl.innerText = '"The best way out is always through."';
                authorEl.innerText = '— Robert Frost';
            }
        }

        function swipe(dir) {
            const card = document.getElementById('main-card');
            const x = dir === 'right' ? 600 : -600;
            const rotate = dir === 'right' ? 30 : -30;
            
            card.style.transform = `translateX(${x}px) rotate(${rotate}deg)`;
            card.style.opacity = "0";

            setTimeout(async () => {
                await fetchNewQuote();
                card.style.transition = "none";
                card.style.transform = "translateX(0) rotate(0)";
                card.style.opacity = "1";
                setTimeout(() => {
                    card.style.transition = "transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease";
                }, 50);
            }, 400);
        }

        window.onload = fetchNewQuote;
    </script>
</body>
</html>
