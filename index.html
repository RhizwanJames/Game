<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkQuotes</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .logo {
            position: absolute;
            top: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #ff6036;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #app {
            position: relative;
            width: 320px;
            height: 480px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.5s ease, opacity 0.5s ease;
        }

        .quote-text {
            color: #222;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .quote-author {
            color: #ff267a;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .no { background: #fff; color: #fd5068; border: 2px solid #fd5068; }
        .yes { background: #fff; color: #1be4a1; border: 2px solid #1be4a1; }
        .btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="logo">SparkQuotes</div>

    <div id="app"></div>

    <div class="controls">
        <button class="btn no" onclick="swipe('left')">✕</button>
        <button class="btn yes" onclick="swipe('right')">♥</button>
    </div>

    <script>
        const quotes = [
            { text: "Pain is temporary. Quitting lasts forever.", author: "Lance Armstrong" },
            { text: "Your only limit is you.", author: "Daily Reminder" },
            { text: "Do it with passion or not at all.", author: "Success" },
            { text: "Great things never came from comfort zones.", author: "Anonymous" },
            { text: "Stop wishing, start doing.", author: "Hustle" }
        ];

        let index = 0;
        const app = document.getElementById('app');

        function loadCard() {
            const q = quotes[index % quotes.length];
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="quote-text">"${q.text}"</div>
                <div class="quote-author">— ${q.author}</div>
            `;
            app.appendChild(div);
        }

        function swipe(dir) {
            const card = app.querySelector('.card');
            if (!card) return;
            
            const moveX = dir === 'right' ? 500 : -500;
            const rotate = dir === 'right' ? 30 : -30;
            
            card.style.transform = `translateX(${moveX}px) rotate(${rotate}deg)`;
            card.style.opacity = '0';
            
            setTimeout(() => {
                card.remove();
                index++;
                loadCard();
            }, 300);
        }

        loadCard(); // Start the first card
    </script>
</body>
</html>
