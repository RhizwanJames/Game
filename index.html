<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hustle Pro - Infinite Inspiration</title>
    <style>
        :root {
            --bg: #f8f9fd;
            --header-text: #a76bff;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #888;
            --shadow: rgba(0,0,0,0.06);
            --btn-no: #fff;
        }

        .dark-mode {
            --bg: #121212;
            --header-text: #ff85ff;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --shadow: rgba(0,0,0,0.4);
            --btn-no: #2a2a2a;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.4s;
        }

        .app-header {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo-box {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #a76bff 0%, #ff85ff 100%);
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold;
        }

        .ui-btn {
            background: var(--card-bg);
            border: 1px solid #eee;
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 5px;
        }

        #app {
            position: relative;
            width: 320px;
            height: 480px;
        }

        .card {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--card-bg);
            border-radius: 25px;
            box-shadow: 0 10px 40px var(--shadow);
            padding: 40px;
            box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s;
        }

        .quote-text {
            color: var(--text-main);
            font-size: 26px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 30px;
        }

        .author-name { font-size: 16px; font-weight: 600; color: var(--text-main); margin-top: auto; }

        .controls { margin-top: 30px; display: flex; gap: 20px; }

        .btn {
            width: 65px; height: 65px;
            border-radius: 50%; border: none;
            cursor: pointer; font-size: 24px;
            box-shadow: 0 8px 20px var(--shadow);
        }

        .no-btn { background: var(--btn-no); color: #ff4b2b; border: 1px solid #eee; }
        .yes-btn { background: linear-gradient(135deg, #a76bff 0%, #ff85ff 100%); color: white; }
    </style>
</head>
<body>

    <div class="app-header">
        <div style="display:flex; align-items:center; gap:8px;">
            <div class="logo-box">H</div>
            <span style="color: var(--header-text); font-weight: bold;">Hustle</span>
        </div>
        <div>
            <select class="ui-btn" id="category" onchange="fetchNewQuote()">
                <option value="famous-quotes">Discover</option>
                <option value="success">Success</option>
                <option value="motivation">Motivation</option>
            </select>
            <button class="ui-btn" onclick="document.body.classList.toggle('dark-mode')">🌓 Theme</button>
        </div>
    </div>

    <div id="app">
        <div id="main-card" class="card">
            <div class="quote-text" id="text">"Your only limit is your mind."</div>
            <div class="author-name" id="name">— Anonymous</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn no-btn" onclick="swipe('left')">✕</button>
        <button class="btn yes-btn" onclick="swipe('right')">♥</button>
    </div>

    <script>
        async function fetchNewQuote() {
            const cat = document.getElementById('category').value;
            try {
                // The Date.now() part forces the browser to get a NEW quote every time
                const res = await fetch(`https://api.quotable.io/random?tags=${cat}&t=${Date.now()}`);
                const data = await res.json();
                document.getElementById('text').innerText = `"${data.content}"`;
                document.getElementById('name').innerText = `— ${data.author}`;
            } catch (e) {
                document.getElementById('text').innerText = "Keep moving forward.";
                document.getElementById('name').innerText = "— Unknown";
            }
        }

        function swipe(dir) {
            const card = document.getElementById('main-card');
            const x = dir === 'right' ? 600 : -600;
            card.style.transform = `translateX(${x}px) rotate(${dir === 'right' ? 20 : -20}deg)`;
            card.style.opacity = '0';

            setTimeout(async () => {
                await fetchNewQuote();
                card.style.transition = "none";
                card.style.transform = "translateX(0) rotate(0)";
                card.style.opacity = '1';
                setTimeout(() => card.style.transition = "transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s", 50);
            }, 300);
        }

        window.onload = fetchNewQuote;
    </script>
</body>
</html>
