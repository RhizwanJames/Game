<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivate By Rhizwan</title>
    <style>
        body {
            margin: 0;
            background: #f8f9fd; /* Light, clean background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* App Header Colors */
        .header {
            position: absolute;
            top: 20px;
            width: 340px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #cc66ff 0%, #ff66cc 100%); /* Signature Gradient */
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(204, 102, 255, 0.3);
        }

        .app-title {
            color: #d63384;
            font-weight: bold;
            font-size: 18px;
        }

        /* Card Colors */
        .card {
            width: 320px;
            height: 480px;
            background: #ffffff;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid #f0f0f0;
        }

        .category-tag {
            background: #f3e8ff; /* Soft purple tag */
            color: #a855f7;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            align-self: flex-start;
            margin-bottom: 30px;
        }

        .quote-text {
            color: #1f2937;
            font-size: 26px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 40px;
        }

        .author-name {
            color: #111827;
            font-weight: 600;
            font-size: 16px;
        }

        /* Control Button Colors */
        .controls {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 20px;
        }

        .btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .btn-no {
            background: #ffffff;
            color: #9ca3af;
            border: 1px solid #f3f4f6;
        }

        .btn-yes {
            background: linear-gradient(135deg, #cc66ff 0%, #ff66cc 100%); /* Gradient Button */
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-box">✨</div>
        <div class="app-title">Motivate By Rhizwan</div>
    </div>

    <div class="card">
        <div class="category-tag">Inspiration</div>
        <div class="quote-text">"The only way to do great work is to love what you do."</div>
        <div class="author-name">Steve Jobs</div>
    </div>

    <div class="controls">
        <button class="btn btn-no">✕</button>
        <button class="btn btn-yes">♥</button>
    </div>

</body>
</html>
