<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkQuotes | Swipe for Motivation</title>
    <style>
        body {
            margin: 0;
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 350px;
            height: 600px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            transition: transform 0.5s ease, opacity 0.5s ease;
            cursor: grab;
            user-select: none;
        }

        .card:active { cursor: grabbing; }

        .quote-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .quote-author {
            color: #ff5a60;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 20px;
        }

        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.9); }
        .dislike { color: #f56767; }
        .like { color: #4ade80; }

    </style>
</head>
<body>

    <div id="app">
        </div>

    <div class="controls">
        <button class="dislike" onclick="swipe('left')">✖</button>
        <button class="like" onclick="swipe('right')">❤</button>
    </div>

    <script>
        const quotes = [
            { text: "Believe you can and you're halfway there.", author: "T. Roosevelt" },
            { text: "Don't count the days, make the days count.", author: "Muhammad Ali" },
            { text: "Your passion is waiting for your courage to catch up.", author: "Isabelle Lafleche" },
            { text: "Small progress is still progress.", author: "Anonymous" },
            { text: "The secret of getting ahead is getting started.", author: "Mark Twain" }
        ];

        let currentIndex = 0;
        const app = document.getElementById('app');

        function createCard(index) {
            const quote = quotes[index % quotes.length];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="quote-text">"${quote.text}"</div>
                <div class="quote-author">— ${quote.author}</div>
            `;
            return card;
        }

        function init() {
            app.appendChild(createCard(currentIndex));
        }

        function swipe(direction) {
            const card = app.querySelector('.card');
            const rotation = direction === 'right' ? 30 : -30;
            const translation = direction === 'right' ? 500 : -500;

            card.style.transform = `translateX(${translation}px) rotate(${rotation}deg)`;
            card.style.opacity = '0';

            setTimeout(() => {
                card.remove();
                currentIndex++;
                app.appendChild(createCard(currentIndex));
            }, 300);
        }

        init();
    </script>
</body>
</html>
