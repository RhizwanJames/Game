<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hustle Pro - Infinite Inspiration</title>
    <style>
        :root {
            --bg: #f8f9fd;
            --header-text: #a76bff;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #888;
            --shadow: rgba(0,0,0,0.06);
        }

        /* Dark Mode Colors */
        .dark-mode {
            --bg: #121212;
            --header-text: #ff85ff;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        /* 1. APP HEADER */
        .app-header {
            position: absolute;
            top: 20px;
            width: 320px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo-container { display: flex; align-items: center; gap: 10px; }

        .logo-box {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #a76bff 0%, #ff85ff 100%);
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 18px;
        }

        .app-name { font-size: 16px; font-weight: bold; color: var(--header-text); }

        .nav-right { display: flex; gap: 8px; }

        .ui-btn {
            background: var(--card-bg);
            border: 1px solid #eee;
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--shadow);
        }

        /* 2. MAIN CARD */
        #app {
            position: relative;
            width: 320px;
            height: 480px;
        }

        .card {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--card-bg);
            border-radius: 25px;
            box-shadow: 0 10px 40px var(--shadow);
            padding: 40px;
            box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease;
        }

        .quote-text {
            color: var(--text-main);
            font-size: 26px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 30px;
            font-family: serif;
        }

        .author-section { display: flex; align-items: center; gap: 12px; margin-top: auto; }

        .author-initial {
            width: 45px; height: 45px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #888;
        }

        .author-label { font-size: 10px; text-transform: uppercase; color: var(--text-sub); margin-bottom: 2px; }
        .author-name { font-size: 15px; font-weight: 600; color: var(--text-main); }

        /* 3. BUTTONS */
        .controls {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 20px;
        }

        .btn {
            width: 65px; height: 65px;
            border-radius: 50%; border: none;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
            box-shadow: 0 8px 20px var(--shadow);
            transition: 0.2s;
        }

        .no-btn { background: #fff; color: #ff4b2b; }
        .yes-btn { background: linear-gradient(135deg, #a76bff 0%, #ff85ff 100%); color: white; }
        .btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="logo-container">
            <div class="logo-box">H</div>
            <div class="app-name">Hustle</div>
        </div>
        <div class="nav-right">
            <select class="ui-btn" id="category" onchange="fetchNewQuote()">
                <option value="famous-quotes">Discover</option>
                <option value="success">Success</option>
                <option value="wisdom">Wisdom</option>
                <option value="inspirational">Inspire</option>
            </select>
            <button class="ui-btn" onclick="toggleDarkMode()">🌓 Theme</button>
        </div>
    </div>

    <div id="app">
        <div id="main-card" class="card">
            <div class="quote-text" id="text">"Loading inspiration..."</div>
            <div class="author-section">
                <div class="author-initial" id="initial">?</div>
                <div>
                    <div class="author-label">Author</div>
                    <div class="author-name" id="name">Please wait</div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn no-btn" onclick="swipe('left')">✕</button>
        <button class="btn yes-btn" onclick="swipe('right')">♥</button>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        async function fetchNewQuote() {
            const cat = document.getElementById('category').value;
            try {
                // Using a timestamp to bypass browser cache and force a new quote
                const res = await fetch(`https://api.quotable.io/random?tags=${cat}&t=${Date.now()}`);
                const data = await res.json();
                renderQuote(data.content, data.author);
            } catch (e) {
                renderQuote("Your only limit is your mind.", "Anonymous");
            }
        }

        function renderQuote(text, author) {
            document.getElementById('text').innerText = `"${text}"`;
            document.getElementById('name').innerText = author;
            document.getElementById('initial').innerText = author[0].toUpperCase();
        }

        function swipe(dir) {
            const card = document.getElementById('main-card');
            const x = dir === 'right' ? 600 : -600;
            const rotate = dir === 'right' ? 25 : -25;
            
            card.style.transform = `translateX(${x}px) rotate(${rotate}deg)`;
            card.style.opacity = '0';

            setTimeout(async () => {
                await fetchNewQuote();
                card.style.transition = "none";
                card.style.transform = "translateX(0) rotate(0)";
                card.style.opacity = '1';
                setTimeout(() => {
                    card.style.transition = "transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease";
                }, 50);
            }, 350);
        }

        window.onload = fetchNewQuote;
    </script>
</body>
</html>
