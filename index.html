<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkQuotes | Times Edition</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a; /* Sleek dark background */
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .header {
            position: absolute;
            top: 40px;
            font-size: 28px;
            font-style: italic;
            letter-spacing: 1px;
            color: #f1f1f1;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        #app {
            position: relative;
            width: 320px;
            height: 480px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
        }

        .quote-text {
            color: #111;
            font-size: 26px;
            font-weight: bold;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        .quote-author {
            color: #d63384; /* Elegant pinkish-red */
            font-size: 16px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .controls {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 22px;
            font-family: serif;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .no { color: #dc3545; border: 2px solid #dc3545; }
        .yes { color: #198754; border: 2px solid #198754; }
        
        .btn:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="header">Motivated By Rhizwan</div>

    <div id="app">
        <div id="main-card" class="card">
            <div class="quote-text" id="text">"Your only limit is your mind."</div>
            <div class="quote-author" id="author">— MOTIVATION</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn no" onclick="swipe('left')">✕</button>
        <button class="btn yes" onclick="swipe('right')">♥</button>
    </div>

    <script>
        const quotes = [
            { t: "Pain is temporary. Quitting lasts forever.", a: "Lance Armstrong" },
            { t: "The best way to predict the future is to create it.", a: "Peter Drucker" },
            { t: "Success is not final, failure is not fatal.", a: "Winston Churchill" },
            { t: "Hard work beats talent when talent doesn't work hard.", a: "Tim Notke" },
            { t: "Great things never came from comfort zones.", a: "Anonymous" }
        ];

        let i = 0;

        function updateCard() {
            const card = document.getElementById('main-card');
            const q = quotes[i % quotes.length];
            
            // Reset position for the new quote
            card.style.transition = "none";
            card.style.transform = "translateX(0) rotate(0)";
            card.style.opacity = "1";
            
            // Allow transition again
            setTimeout(() => {
                card.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease";
            }, 50);

            document.getElementById('text').innerText = `"${q.t}"`;
            document.getElementById('author').innerText = `— ${q.a.toUpperCase()}`;
        }

        function swipe(dir) {
            const card = document.getElementById('main-card');
            const x = dir === 'right' ? 500 : -500;
            const rotate = dir === 'right' ? 25 : -25;
            
            card.style.transform = `translateX(${x}px) rotate(${rotate}deg)`;
            card.style.opacity = "0";

            setTimeout(() => {
                i++;
                updateCard();
            }, 350);
        }

        // Initialize with first quote
        updateCard();
    </script>
</body>
</html>
