<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Catch the Heart Game</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    margin: 0;
  }

  h1 {
    margin-top: 20px;
  }

  #gameArea {
    width: 90%;
    height: 60vh;
    margin: 20px auto;
    border: 3px solid white;
    border-radius: 15px;
    position: relative;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.2);
  }

  #heart {
    font-size: 40px;
    position: absolute;
    cursor: pointer;
  }

  #score {
    font-size: 20px;
    margin-top: 10px;
  }

  #letter {
    display: none;
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 300px;
    margin: 20px auto;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
  }

  /* Image styling */
  #header-image {
    max-width: 90%;
    border-radius: 15px;
    margin-bottom: 20px;
  }
</style>
</head>

<body>

<h1>Catch the Heart 💖</h1>
<p>Click the heart 10 times to unlock the surprise!</p>

<!-- Image inserted here -->
<img id="header-image" src="love-image.jpg" alt="love-image.jpg" />

<div id="score">Score: 0</div>

<div id="gameArea">
  <div id="heart">❤️</div>
</div>

<div id="letter">
  <h2>💌 Surprise Letter</h2>
  <p>
    Hi ❤️<br /><br />
    You made it to the end of the game!  
    I just wanted to say that you are very special to me.  
    Your smile makes my day brighter and I'm really lucky to know you.  
    Thank you for being amazing.
  </p>
</div>

<script>
  let heart = document.getElementById("heart");
  let gameArea = document.getElementById("gameArea");
  let scoreText = document.getElementById("score");
  let letter = document.getElementById("letter");

  let score = 0;
  let goal = 10;

  function moveHeart() {
    let x = Math.random() * (gameArea.clientWidth - 40);
    let y = Math.random() * (gameArea.clientHeight - 40);
    heart.style.left = x + "px";
    heart.style.top = y + "px";
  }

  heart.addEventListener("click", function () {
    score++;
    scoreText.textContent = "Score: " + score;
    moveHeart();

    if (score >= goal) {
      heart.style.display = "none";
      letter.style.display = "block";
    }
  });

  moveHeart();
</script>

</body>
</html>
